# ===========================================================================
#  Duolingo - mikroservisna platforma (Domaci 2 + Seminarski)
#  EDA (Kafka) | CI/CD | Security | Monitoring (Prometheus+Grafana) | paterni
#  Pokretanje:  docker compose up --build
# ===========================================================================
services:

  # ---------------- BAZE PODATAKA (Database per service) -------------------
  user-db:
    image: postgres:16-alpine
    environment: { POSTGRES_DB: user_db, POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-postgres}" }
    volumes: [ "user-data:/var/lib/postgresql/data" ]
    healthcheck: { test: ["CMD-SHELL","pg_isready -U postgres"], interval: 5s, retries: 10 }

  course-db:
    image: postgres:16-alpine
    environment: { POSTGRES_DB: course_db, POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-postgres}" }
    volumes: [ "course-data:/var/lib/postgresql/data" ]
    healthcheck: { test: ["CMD-SHELL","pg_isready -U postgres"], interval: 5s, retries: 10 }

  lesson-db:
    image: postgres:16-alpine
    environment: { POSTGRES_DB: lesson_db, POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-postgres}" }
    volumes: [ "lesson-data:/var/lib/postgresql/data" ]
    healthcheck: { test: ["CMD-SHELL","pg_isready -U postgres"], interval: 5s, retries: 10 }

  assessment-db:
    image: postgres:16-alpine
    environment: { POSTGRES_DB: assessment_db, POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-postgres}" }
    volumes: [ "assessment-data:/var/lib/postgresql/data" ]
    healthcheck: { test: ["CMD-SHELL","pg_isready -U postgres"], interval: 5s, retries: 10 }

  notification-db:
    image: postgres:16-alpine
    environment: { POSTGRES_DB: notification_db, POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-postgres}" }
    volumes: [ "notification-data:/var/lib/postgresql/data" ]
    healthcheck: { test: ["CMD-SHELL","pg_isready -U postgres"], interval: 5s, retries: 10 }

  progress-db:
    image: mongo:7
    volumes: [ "progress-data:/data/db" ]
    healthcheck: { test: ["CMD","mongosh","--eval","db.runCommand('ping')"], interval: 5s, retries: 10 }

  # ---------------- MESSAGE BROKER: Apache Kafka (KRaft, bez ZooKeeper-a) ---
  kafka:
    image: bitnami/kafka:3.7
    environment:
      KAFKA_CFG_NODE_ID: "0"
      KAFKA_CFG_PROCESS_ROLES: "controller,broker"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "0@kafka:9093"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    ports: [ "9092:9092" ]
    volumes: [ "kafka-data:/bitnami/kafka" ]
    healthcheck:
      test: ["CMD-SHELL","kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      retries: 15

  # ---------------- EKSTERNI API (open-source): LibreTranslate --------------
  libretranslate:
    image: libretranslate/libretranslate:latest
    environment: { LT_LOAD_ONLY: "en,de,es,fr,it,pt" }
    ports: [ "5000:5000" ]
    volumes: [ "lt-models:/home/libretranslate/.local" ]

  # ---------------- MONITORING: Prometheus + Grafana -----------------------
  prometheus:
    image: prom/prometheus:latest
    volumes: [ "./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro" ]
    ports: [ "9090:9090" ]

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "admin"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
    ports: [ "3001:3000" ]
    volumes:
      - "./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro"
      - "./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro"
    depends_on: [ prometheus ]

  # ---------------- MIKROSERVISI -------------------------------------------
  user-service:
    build: ./services/user-service
    environment:
      SERVICE_NAME: user-service
      DB_HOST: user-db
      DB_PASSWORD: "${POSTGRES_PASSWORD:-postgres}"
      JWT_SECRET: "${JWT_SECRET:-dev_shared_secret}"
      CORS_ORIGINS: "http://localhost:3000"
    depends_on: { user-db: { condition: service_healthy } }

  course-service:
    build: ./services/course-service
    environment:
      SERVICE_NAME: course-service
      DB_HOST: course-db
      DB_PASSWORD: "${POSTGRES_PASSWORD:-postgres}"
      JWT_SECRET: "${JWT_SECRET:-dev_shared_secret}"
      USER_SERVICE_URL: http://user-service:3001
      LESSON_SERVICE_URL: http://lesson-service:3003
      KAFKA_BROKERS: kafka:9092
      CORS_ORIGINS: "http://localhost:3000"
    depends_on:
      course-db: { condition: service_healthy }
      kafka: { condition: service_healthy }
      user-service: { condition: service_started }

  lesson-service:
    build: ./services/lesson-service
    environment:
      SERVICE_NAME: lesson-service
      DB_HOST: lesson-db
      DB_PASSWORD: "${POSTGRES_PASSWORD:-postgres}"
      JWT_SECRET: "${JWT_SECRET:-dev_shared_secret}"
      USER_SERVICE_URL: http://user-service:3001
      COURSE_SERVICE_URL: http://course-service:3002
      DICTIONARY_API_URL: https://api.dictionaryapi.dev/api/v2/entries
      LIBRETRANSLATE_URL: http://libretranslate:5000
      CORS_ORIGINS: "http://localhost:3000"
    depends_on:
      lesson-db: { condition: service_healthy }
      course-service: { condition: service_started }

  assessment-service:
    build: ./services/assessment-service
    environment:
      SERVICE_NAME: assessment-service
      DB_HOST: assessment-db
      DB_PASSWORD: "${POSTGRES_PASSWORD:-postgres}"
      KAFKA_BROKERS: kafka:9092
      CORS_ORIGINS: "http://localhost:3000"
    depends_on:
      assessment-db: { condition: service_healthy }
      kafka: { condition: service_healthy }

  progress-service:
    build: ./services/progress-service
    environment:
      SERVICE_NAME: progress-service
      MONGO_URL: mongodb://progress-db:27017/progress_db
      KAFKA_BROKERS: kafka:9092
      CORS_ORIGINS: "http://localhost:3000"
    depends_on:
      progress-db: { condition: service_healthy }
      kafka: { condition: service_healthy }

  notification-service:
    build: ./services/notification-service
    environment:
      SERVICE_NAME: notification-service
      DB_HOST: notification-db
      DB_PASSWORD: "${POSTGRES_PASSWORD:-postgres}"
      KAFKA_BROKERS: kafka:9092
      CORS_ORIGINS: "http://localhost:3000"
    depends_on:
      notification-db: { condition: service_healthy }
      kafka: { condition: service_healthy }

  # Hibridni modul (Consumer + Producer)
  enrollment-processor:
    build: ./services/enrollment-processor
    environment:
      SERVICE_NAME: enrollment-processor
      KAFKA_BROKERS: kafka:9092
    depends_on:
      kafka: { condition: service_healthy }

  speech-service:
    build: ./services/speech-service
    environment:
      SERVICE_NAME: speech-service
      KAFKA_BROKERS: kafka:9092
      CORS_ORIGINS: "http://localhost:3000"
    depends_on:
      kafka: { condition: service_healthy }

  media-service:
    build: ./services/media-service
    environment:
      SERVICE_NAME: media-service
      CORS_ORIGINS: "http://localhost:3000"

  # ---------------- API GATEWAY --------------------------------------------
  gateway:
    build: ./gateway
    environment:
      SERVICE_NAME: api-gateway
      CORS_ORIGINS: "http://localhost:3000"
    ports: [ "8080:8080" ]
    depends_on:
      - user-service
      - course-service
      - lesson-service
      - assessment-service
      - progress-service
      - notification-service
      - speech-service
      - media-service

  # ---------------- KLIJENT (UI) -------------------------------------------
  frontend:
    build:
      context: ./frontend
      args: { VITE_API_URL: "http://localhost:8080" }
    ports: [ "3000:80" ]
    depends_on: [ gateway ]

volumes:
  user-data: {}
  course-data: {}
  lesson-data: {}
  assessment-data: {}
  notification-data: {}
  progress-data: {}
  kafka-data: {}
  lt-models: {}
